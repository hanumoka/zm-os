<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Snake</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0f172a;
        color: #e2e8f0;
        font-family: -apple-system, system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
      }
      #hud {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 600px;
        padding: 8px 12px;
        background: #1e293b;
        border-bottom: 1px solid #334155;
        font-size: 13px;
        gap: 12px;
        flex-shrink: 0;
      }
      #hud .score-label { color: #94a3b8; }
      #hud .score-value {
        font-size: 18px;
        font-weight: 700;
        color: #4ade80;
        min-width: 40px;
        text-align: right;
      }
      #hud .hint {
        font-size: 11px;
        color: #64748b;
        text-align: center;
        flex: 1;
      }
      #game-container canvas {
        display: block;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.85);
        gap: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
      }
      #overlay.visible { opacity: 1; pointer-events: auto; }
      #overlay .over-title {
        font-size: 32px;
        font-weight: 800;
        color: #f87171;
        letter-spacing: -0.5px;
      }
      #overlay .over-score {
        font-size: 16px;
        color: #94a3b8;
      }
      #overlay .over-hint {
        font-size: 13px;
        color: #22d3ee;
        margin-top: 8px;
        animation: blink 1s step-start infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span class="score-label">점수</span>
      <span class="score-value" id="score-display">0</span>
      <span class="hint" id="hud-hint">화살표 키로 조종</span>
    </div>
    <div id="game-container"></div>

    <!-- Game Over 오버레이 -->
    <div id="overlay">
      <div class="over-title">Game Over</div>
      <div class="over-score" id="over-score">점수: 0</div>
      <div class="over-hint">Space 키로 재시작</div>
    </div>

    <!-- Phaser 3 — host self origin 상대경로 (sandbox srcdoc null-origin → host /phaser.min.js 로드) -->
    <script src="/phaser.min.js"></script>

    <script>
      (function () {
        'use strict';

        // ── 상수 ────────────────────────────────────────────────────────────────
        var GRID     = 20;   // 한 셀 픽셀 크기
        var COLS     = 30;   // 열 수
        var ROWS     = 22;   // 행 수
        var WIDTH    = GRID * COLS;  // 600px
        var HEIGHT   = GRID * ROWS; // 440px
        var TICK_MS  = 120;  // 이동 주기 (ms)

        // ── 색상 상수 ────────────────────────────────────────────────────────────
        var COLOR_BG      = 0x0f172a;
        var COLOR_GRID    = 0x1e293b;
        var COLOR_SNAKE   = 0x4ade80;  // green-400
        var COLOR_HEAD    = 0x86efac;  // green-300 (머리 강조)
        var COLOR_FOOD    = 0xf87171;  // red-400
        var COLOR_BORDER  = 0x334155;  // slate-700

        // ── DOM 참조 ────────────────────────────────────────────────────────────
        var scoreDisplay = document.getElementById('score-display');
        var hudHint      = document.getElementById('hud-hint');
        var overlay      = document.getElementById('overlay');
        var overScore    = document.getElementById('over-score');

        // ── 유틸 ────────────────────────────────────────────────────────────────
        function randInt(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randFood(snake) {
          var attempts = 0;
          while (attempts < 200) {
            var fx = randInt(0, COLS - 1);
            var fy = randInt(0, ROWS - 1);
            var overlap = false;
            for (var i = 0; i < snake.length; i++) {
              if (snake[i].x === fx && snake[i].y === fy) { overlap = true; break; }
            }
            if (!overlap) return { x: fx, y: fy };
            attempts++;
          }
          // fallback: 빈 공간 못 찾으면 (0,0) — 사실상 발생 안 함
          return { x: 0, y: 0 };
        }

        // ── Phaser Scene ─────────────────────────────────────────────────────────
        var SnakeScene = new Phaser.Class({
          Extends: Phaser.Scene,

          initialize: function SnakeScene() {
            Phaser.Scene.call(this, { key: 'SnakeScene' });
          },

          // ── 상태 ────────────────────────────────────────────────────────────
          snake:       null,  // [{x, y}] 머리가 [0]
          direction:   null,  // {dx, dy}
          nextDir:     null,  // 버퍼 — tick 전까지 실제 적용 대기
          food:        null,  // {x, y}
          score:       0,
          started:     false, // 첫 키 입력 전까지 대기 (자동 벽 충돌 방지)
          gameOver:    false,
          tickTimer:   null,
          graphics:    null,
          cursors:     null,
          spaceKey:    null,
          lastTickTime: 0,

          // ── create ───────────────────────────────────────────────────────────
          create: function () {
            this.graphics = this.add.graphics();

            // 키보드 입력
            this.cursors  = this.input.keyboard.createCursorKeys();
            this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // 키 이벤트 — 방향 전환 (180도 반전 방지)
            var self = this;
            function setDir(dx, dy) {
              if (self.gameOver) return;
              // 180도 반전 방지 (started 후에만 — 첫 입력은 항상 허용)
              if (self.started) {
                if (dx !== 0 && self.direction.dx !== 0) return;
                if (dy !== 0 && self.direction.dy !== 0) return;
              }
              self.nextDir = { dx: dx, dy: dy };
              if (!self.started) {
                self.started = true;
                hudHint.textContent = '화살표 키로 조종';
              }
            }
            this.input.keyboard.on('keydown-UP',    function () { setDir(0, -1); });
            this.input.keyboard.on('keydown-DOWN',  function () { setDir(0,  1); });
            this.input.keyboard.on('keydown-LEFT',  function () { setDir(-1, 0); });
            this.input.keyboard.on('keydown-RIGHT', function () { setDir( 1, 0); });
            this.input.keyboard.on('keydown-SPACE', function () {
              if (self.gameOver) self.restartGame();
            });

            this.initGame();
          },

          // ── 게임 초기화 ──────────────────────────────────────────────────────
          initGame: function () {
            var startX = Math.floor(COLS / 2);
            var startY = Math.floor(ROWS / 2);

            this.snake     = [{ x: startX, y: startY }];
            this.direction = { dx: 0, dy: 0 };
            this.nextDir   = { dx: 0, dy: 0 };
            this.food      = randFood(this.snake);
            this.score     = 0;
            this.started   = false;
            this.gameOver  = false;
            this.lastTickTime = 0;

            // UI 업데이트
            scoreDisplay.textContent = '0';
            hudHint.textContent = '화살표 키로 시작';
            overlay.classList.remove('visible');
          },

          // ── 재시작 ───────────────────────────────────────────────────────────
          restartGame: function () {
            this.initGame();
          },

          // ── tick — 뱀 이동 1스텝 ─────────────────────────────────────────────
          tick: function () {
            if (this.gameOver) return;
            if (!this.started) return; // 첫 키 입력 전까지 대기 — 자동 벽 충돌 방지

            // 방향 적용 (버퍼)
            this.direction = this.nextDir;

            var head   = this.snake[0];
            var newX   = head.x + this.direction.dx;
            var newY   = head.y + this.direction.dy;

            // 벽 충돌 검사
            if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS) {
              this.triggerGameOver();
              return;
            }

            // 자기 자신 충돌 (꼬리 제외 — 꼬리는 이번 tick에 제거)
            for (var i = 0; i < this.snake.length - 1; i++) {
              if (this.snake[i].x === newX && this.snake[i].y === newY) {
                this.triggerGameOver();
                return;
              }
            }

            // 새 머리 추가
            this.snake.unshift({ x: newX, y: newY });

            // 음식 먹기 검사
            if (newX === this.food.x && newY === this.food.y) {
              this.score++;
              scoreDisplay.textContent = String(this.score);
              this.food = randFood(this.snake);
              // 꼬리 유지 → 길이 +1
            } else {
              // 꼬리 제거
              this.snake.pop();
            }
          },

          // ── Game Over ────────────────────────────────────────────────────────
          triggerGameOver: function () {
            this.gameOver = true;
            hudHint.textContent = 'Game Over';
            overScore.textContent = '점수: ' + this.score;
            overlay.classList.add('visible');
          },

          // ── 렌더링 ───────────────────────────────────────────────────────────
          drawFrame: function () {
            var g = this.graphics;
            g.clear();

            // 배경
            g.fillStyle(COLOR_BG, 1);
            g.fillRect(0, 0, WIDTH, HEIGHT);

            // 그리드 선 (선택적 — 옅게)
            g.lineStyle(1, COLOR_GRID, 0.5);
            for (var cx = 0; cx <= COLS; cx++) {
              g.beginPath();
              g.moveTo(cx * GRID, 0);
              g.lineTo(cx * GRID, HEIGHT);
              g.strokePath();
            }
            for (var ry = 0; ry <= ROWS; ry++) {
              g.beginPath();
              g.moveTo(0, ry * GRID);
              g.lineTo(WIDTH, ry * GRID);
              g.strokePath();
            }

            // 테두리
            g.lineStyle(2, COLOR_BORDER, 1);
            g.strokeRect(0, 0, WIDTH, HEIGHT);

            // 음식 — 빨간 원
            g.fillStyle(COLOR_FOOD, 1);
            var fx = this.food.x * GRID + GRID / 2;
            var fy = this.food.y * GRID + GRID / 2;
            g.fillCircle(fx, fy, GRID / 2 - 2);

            // 뱀 body — 초록 rect (내부 패딩 1px)
            var PAD = 2;
            for (var si = this.snake.length - 1; si >= 1; si--) {
              var seg = this.snake[si];
              g.fillStyle(COLOR_SNAKE, 1);
              g.fillRect(
                seg.x * GRID + PAD,
                seg.y * GRID + PAD,
                GRID - PAD * 2,
                GRID - PAD * 2
              );
            }

            // 뱀 머리 — 밝은 초록 rect
            if (this.snake.length > 0) {
              var h = this.snake[0];
              g.fillStyle(COLOR_HEAD, 1);
              g.fillRect(
                h.x * GRID + PAD,
                h.y * GRID + PAD,
                GRID - PAD * 2,
                GRID - PAD * 2
              );
            }
          },

          // ── update (매 프레임) ───────────────────────────────────────────────
          update: function (time) {
            // tick 주기 확인
            if (time - this.lastTickTime >= TICK_MS) {
              this.lastTickTime = time;
              this.tick();
            }
            this.drawFrame();
          },
        });

        // ── Phaser.Game 설정 ─────────────────────────────────────────────────────
        var config = {
          type: Phaser.AUTO,
          parent: 'game-container',
          width: WIDTH,
          height: HEIGHT,
          backgroundColor: '#0f172a',
          scene: [SnakeScene],
          // render 설정 — 투명 canvas 불필요
          transparent: false,
          // anti-aliasing 끄기 — pixel grid 게임에 적합
          antialias: false,
          // audio 없음
          audio: { noAudio: true },
        };

        // eslint 없으므로 var 사용 OK
        var game = new Phaser.Game(config); // game 변수 — future use 가능
        void game; // unused var 경고 방지 (tsc strict)
      })();
    </script>
  </body>
</html>
