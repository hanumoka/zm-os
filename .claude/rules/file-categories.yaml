# file-categories.yaml
# 파일 카테고리 분류 — category_guard.py 참조
# 단일 개발자 POC — SHARDED/EVENTS는 경량 적용

categories:
  architecture:
    dir: "docs/01-architecture"
    patterns: ["*.md"]
    description: "기능별 아키텍처 문서"

  decisions:
    dir: "docs/02-decisions"
    patterns: ["adr-*.md", "index.md"]
    description: "Architecture Decision Records"

  policy:
    dir: "docs/03-policy"
    patterns: ["*.md", "_digest.md"]
    description: "정책 SSOT + 다이제스트"

  planning:
    dir: "docs/04-planning"
    patterns: ["*.md"]
    description: "PRD, 로드맵, Phase 계획"

  analysis:
    dir: "docs/05-analysis"
    patterns: ["*.md"]
    description: "외부 리서치 + 기술 분석"

  security:
    dir: "docs/06-security"
    patterns: ["*.md"]
    description: "보안 감사 리포트"

  testing:
    dir: "docs/07-testing"
    patterns: ["*.md"]
    description: "테스트 전략/결과"

  session:
    dir: "docs/10-session"
    patterns: ["quick-ref.md", "current-phase.md"]
    description: "세션 컨텍스트 (고정 파일명)"

  archive:
    dir: "docs/11-archive"
    patterns: ["????-??.md"]
    description: "월별 작업 로그"

  troubleshooting:
    dir: "docs/13-troubleshooting"
    patterns: ["index.md", "entries.md"]
    description: "트러블슈팅 인덱스 + 엔트리"

  events:
    dir: "events"
    patterns: ["????-??.jsonl"]
    description: "이벤트 스트림 (append-only)"
    enforce: "append_only"

# 교차 검증 규칙
cross_validation:
  - rule: "adr-*.md 파일은 docs/02-decisions/ 에만 존재"
  - rule: "_digest.md 파일은 docs/03-policy/ 에만 존재"
  - rule: "quick-ref.md, current-phase.md는 docs/10-session/ 에만 존재"
  - rule: "entries.md는 docs/13-troubleshooting/ 에만 존재"

# ─────────────────────────────────────────────────────────────────────
# 거버넌스 카테고리 (A~E) — 헌법 3 (domain-separation) / sonix_docs 이식
# {PREFIX} = team-config.json 의 ctx_suffix (현재 KYB 1인, 확장가능)
# ─────────────────────────────────────────────────────────────────────
governance_categories:
  HUMAN:        # A — 사람 전용 (자동화 편집은 [WARN])
    patterns:
      - "docs/01-architecture/**/*.md"
      - "docs/03-policy/**/*.md"
      - "docs/05-analysis/**/*.md"
      - "docs/06-security/**/*.md"
      - "docs/07-testing/**/*.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "README.md"
  SYSTEM:       # B — 자동화 전용 (사람 직접 편집 [WARN]→[BLOCK])
    patterns:
      - ".project-memory/claims/*.json"
      - "docs/03-policy/_digest.md"
      - "docs/04-planning/_derived-wu-state.md"
  SHARDED:      # C — 개인별 (본인 PREFIX 만)
    patterns:
      - ".project-memory/context-{PREFIX}.md"
      - ".project-memory/handoffs/{PREFIX}/**"
    enforcement:
      cross_prefix_edit: block
  EVENTS:       # D — append-only (수정/삭제 금지)
    patterns:
      - "events/*.jsonl"
    enforcement:
      append_only: true
  LOCAL:        # E — 호스트별 local (gitignored)
    patterns:
      - ".project-memory/context-*.md"
      - ".project-memory/pre-compact-recovery.md"
      - ".claude/settings.local.json"
      - ".claude/plans/**"
      - ".claude/pre-compact-recovery.md"

# 강제 프로파일 (현재: SYSTEM/EVENTS [WARN], category_guard.py)
governance_enforcement:
  phase: 1
  note: "단일 개발자 + 확장가능 구조. SHARDED cross_prefix 는 팀원 추가 시 활성."
